<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>扑克计算测试</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="main-panel">
      <p class="eyebrow">Browser Test Runner</p>
      <h1>扑克计算测试</h1>
      <section id="results" class="content"></section>
    </main>
    <script type="module">
      import { parseCard, parseCards, hasDuplicateCards } from "./src/lib/cards.js";
      import { calculatePotOdds, calculateSpr, estimateDrawEquity } from "./src/lib/pokerMath.js";
      import { analyzeBoardTexture } from "./src/lib/boardTexture.js";
      import { escapeHtml } from "./src/lib/sanitize.js";
      import { normalizeState } from "./src/lib/storage.js";
      import { createExportEnvelope, validateImportEnvelope } from "./src/lib/importExport.js";
      import { awardBadge, awardXp, calculateMastery, calculateStreak, getDailyTasks, getLevel, markDailyActivity, maybeAwardDailyBonus } from "./src/lib/rewards.js";
      import { lessons } from "./src/data/lessons.js";
      import { drills } from "./src/data/drills.js";
      import { glossaryTerms } from "./src/data/glossary.js";
      import { preflopRanges } from "./src/data/preflopRanges.js";

      const tests = [
        ["parseCard('As') succeeds", () => parseCard("As").ok],
        ["parseCard('1x') fails", () => !parseCard("1x").ok],
        ["duplicate detection catches As As", () => {
          const parsed = parseCards("As As");
          return hasDuplicateCards(parsed.cards);
        }],
        ["pot odds call 50 into 100 equals 0.25", () => calculatePotOdds(50, 100) === 0.25],
        ["SPR stack 300 pot 100 equals 3", () => calculateSpr(300, 100) === 3],
        ["9 outs with two cards to come equals 0.36", () => estimateDrawEquity(9, 2) === 0.36],
        ["As Ah 7d is paired", () => {
          const parsed = parseCards("As Ah 7d");
          return analyzeBoardTexture(parsed.cards).paired === "paired";
        }],
        ["As Ts 7s is monotone", () => {
          const parsed = parseCards("As Ts 7s");
          return analyzeBoardTexture(parsed.cards).suitState === "monotone";
        }],
        ["escapeHtml protects tags", () => escapeHtml("<script>") === "&lt;script&gt;"],
        ["legacy savedMistakes ids migrate to unresolved records", () => {
          const state = normalizeState({ savedMistakes: ["dc-002"] });
          return state.savedMistakes.length === 1
            && state.savedMistakes[0].questionId === "dc-002"
            && state.savedMistakes[0].status === "unresolved";
        }],
        ["legacy hand reviews receive new defaults", () => {
          const state = normalizeState({ handReviews: [{ id: "r1", heroHand: "As Ks" }] });
          return Array.isArray(state.handReviews[0].errorTypes)
            && state.handReviews[0].userNote === ""
            && state.handReviews[0].streetFocus === "overall";
        }],
        ["valid import envelope is accepted", () => {
          const envelope = createExportEnvelope({ completedLessons: ["x"], drillAttempts: [], savedMistakes: [], handReviews: [] });
          return validateImportEnvelope(envelope).ok;
        }],
        ["invalid import envelope is rejected", () => {
          return !validateImportEnvelope({ app: "other", version: 1, state: {} }).ok;
        }],
        ["reward migration defaults beginner mode on", () => {
          const state = normalizeState({});
          return state.beginnerMode === true && state.xp === 0 && Array.isArray(state.badges);
        }],
        ["getLevel(0) returns level 1", () => getLevel(0) === 1],
        ["awardXp increases xp and appends event", () => {
          const state = awardXp(normalizeState({}), "test", 30, "测试");
          return state.xp === 30 && state.xpEvents.length === 1;
        }],
        ["awardBadge stores badge once", () => {
          const state = awardBadge(awardBadge(normalizeState({}), "first-lesson"), "first-lesson");
          return state.badges.length === 1;
        }],
        ["daily training task completes at five answers", () => {
          const state = markDailyActivity(normalizeState({}), "trainCount", 5, new Date("2026-06-13T00:00:00Z"));
          return getDailyTasks(state, new Date("2026-06-13T00:00:00Z")).train;
        }],
        ["all lessons include beginner expansion fields", () => {
          return lessons.every((lesson) => lesson.plainLanguage
            && lesson.tableExample
            && lesson.whyItMatters
            && Array.isArray(lesson.miniChecklist)
            && lesson.miniChecklist.length >= 3
            && lesson.encouragement);
        }],
        ["first four lessons are beginner safe", () => {
          return lessons.slice(0, 4).every((lesson) => lesson.beginnerSafe === true);
        }],
        ["all lessons include textbook goals", () => {
          return lessons.every((lesson) => Array.isArray(lesson.goals) && lesson.goals.length >= 2);
        }],
        ["all lessons include at least three textbook sections", () => {
          return lessons.every((lesson) => Array.isArray(lesson.textbook)
            && lesson.textbook.length >= 3
            && lesson.textbook.every((section) => section.heading && section.body));
        }],
        ["all lessons include worked examples and decision flow", () => {
          return lessons.every((lesson) => Array.isArray(lesson.examples)
            && lesson.examples.length >= 1
            && lesson.examples.every((example) => example.title && example.scenario && example.takeaway)
            && Array.isArray(lesson.decisionFlow)
            && lesson.decisionFlow.length >= 3);
        }],
        ["all lessons include mistake details", () => {
          return lessons.every((lesson) => Array.isArray(lesson.mistakeDetails)
            && lesson.mistakeDetails.length >= 2
            && lesson.mistakeDetails.every((item) => item.mistake && item.whyItHurts));
        }],
        ["all lesson quizzes have three answerable questions", () => {
          return lessons.every((lesson) => Array.isArray(lesson.quiz)
            && lesson.quiz.length === 3
            && lesson.quiz.every((item) => item.question
              && Array.isArray(item.options)
              && item.options.length >= 2
              && item.options.includes(item.answer)
              && item.explanation));
        }],
        ["all lessons include next step actions", () => {
          const validRoutes = new Set(["learning", "ranges", "glossary", "training", "mistakes", "review", "resources"]);
          return lessons.every((lesson) => Array.isArray(lesson.nextSteps)
            && lesson.nextSteps.length >= 1
            && lesson.nextSteps.every((step) => step.label && validRoutes.has(step.route)));
        }],
        ["glossary includes at least 16 beginner terms", () => {
          return glossaryTerms.length >= 16
            && glossaryTerms.every((item) => item.term && item.category && item.simple && item.example);
        }],
        ["preflop ranges cover all six 6-max positions", () => {
          const positions = new Set(preflopRanges.map((item) => item.position));
          return ["UTG", "HJ", "CO", "BTN", "SB", "BB"].every((position) => positions.has(position));
        }],
        ["streak counts consecutive active days", () => {
          const state = normalizeState({});
          const dayOne = markDailyActivity(state, "lesson", true, new Date("2026-06-12T00:00:00Z"));
          const dayTwo = markDailyActivity(dayOne, "review", true, new Date("2026-06-13T00:00:00Z"));
          return calculateStreak(dayTwo.dailyActivity, new Date("2026-06-13T00:00:00Z")) === 2;
        }],
        ["mastery returns four skill bars", () => {
          const mastery = calculateMastery(normalizeState({}), lessons, drills);
          return mastery.length === 4 && mastery.every((item) => item.id && item.label && Number.isFinite(item.value));
        }],
        ["daily bonus awards once after all tasks complete", () => {
          const date = new Date("2026-06-13T00:00:00Z");
          const withLesson = markDailyActivity(normalizeState({}), "lesson", true, date);
          const withTraining = markDailyActivity(withLesson, "trainCount", 5, date);
          const withReview = markDailyActivity(withTraining, "review", true, date);
          const awarded = maybeAwardDailyBonus(withReview, date);
          const awardedAgain = maybeAwardDailyBonus(awarded, date);
          return awarded.xp === 40
            && awardedAgain.xp === 40
            && getDailyTasks(awarded, date).bonusAwarded;
        }]
      ];

      const results = document.querySelector("#results");
      const rows = tests.map(([name, run]) => {
        let passed = false;
        let detail = "";
        try {
          passed = Boolean(run());
        } catch (error) {
          detail = error.message;
        }
        return `
          <div class="card">
            <strong>${passed ? "PASS" : "FAIL"} · ${name}</strong>
            ${detail ? `<p class="muted">${detail}</p>` : ""}
          </div>
        `;
      });

      results.innerHTML = rows.join("");
    </script>
  </body>
</html>
