<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>扑克计算测试</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="main-panel">
      <p class="eyebrow">Browser Test Runner</p>
      <h1>扑克计算测试</h1>
      <section id="results" class="content"></section>
    </main>
    <script type="module">
      import { parseCard, parseCards, hasDuplicateCards } from "./src/lib/cards.js";
      import { calculatePotOdds, calculateSpr, estimateDrawEquity } from "./src/lib/pokerMath.js";
      import { analyzeBoardTexture } from "./src/lib/boardTexture.js";
      import { escapeHtml } from "./src/lib/sanitize.js";
      import { normalizeState } from "./src/lib/storage.js";
      import { createExportEnvelope, validateImportEnvelope } from "./src/lib/importExport.js";
      import { awardBadge, awardXp, calculateMastery, calculateStreak, getDailyTasks, getLevel, markDailyActivity, maybeAwardDailyBonus } from "./src/lib/rewards.js";
      import { searchContent } from "./src/lib/contentSearch.js";
      import { lessons } from "./src/data/lessons.js";
      import { drills } from "./src/data/drills.js";
      import { glossaryTerms } from "./src/data/glossary.js";
      import { preflopRanges } from "./src/data/preflopRanges.js";
      import { renderLearning } from "./src/features/learning.js";
      import { renderDashboard } from "./src/features/dashboard.js";
      import { renderGlossary, setGlossarySearch } from "./src/features/glossary.js";
      import { renderRanges } from "./src/features/ranges.js";
      import { renderReview } from "./src/features/review.js";

      const tests = [
        ["parseCard('As') succeeds", () => parseCard("As").ok],
        ["parseCard('1x') fails", () => !parseCard("1x").ok],
        ["duplicate detection catches As As", () => {
          const parsed = parseCards("As As");
          return hasDuplicateCards(parsed.cards);
        }],
        ["pot odds call 50 into 100 equals 0.25", () => calculatePotOdds(50, 100) === 0.25],
        ["SPR stack 300 pot 100 equals 3", () => calculateSpr(300, 100) === 3],
        ["9 outs with two cards to come equals 0.36", () => estimateDrawEquity(9, 2) === 0.36],
        ["As Ah 7d is paired", () => {
          const parsed = parseCards("As Ah 7d");
          return analyzeBoardTexture(parsed.cards).paired === "paired";
        }],
        ["As Ts 7s is monotone", () => {
          const parsed = parseCards("As Ts 7s");
          return analyzeBoardTexture(parsed.cards).suitState === "monotone";
        }],
        ["escapeHtml protects tags", () => escapeHtml("<script>") === "&lt;script&gt;"],
        ["legacy savedMistakes ids migrate to unresolved records", () => {
          const state = normalizeState({ savedMistakes: ["dc-002"] });
          return state.savedMistakes.length === 1
            && state.savedMistakes[0].questionId === "dc-002"
            && state.savedMistakes[0].status === "unresolved";
        }],
        ["legacy hand reviews receive new defaults", () => {
          const state = normalizeState({ handReviews: [{ id: "r1", heroHand: "As Ks" }] });
          return Array.isArray(state.handReviews[0].errorTypes)
            && state.handReviews[0].userNote === ""
            && state.handReviews[0].streetFocus === "overall";
        }],
        ["valid import envelope is accepted", () => {
          const envelope = createExportEnvelope({ completedLessons: ["x"], drillAttempts: [], savedMistakes: [], handReviews: [] });
          return validateImportEnvelope(envelope).ok;
        }],
        ["invalid import envelope is rejected", () => {
          return !validateImportEnvelope({ app: "other", version: 1, state: {} }).ok;
        }],
        ["reward migration defaults beginner mode on", () => {
          const state = normalizeState({});
          return state.beginnerMode === true && state.xp === 0 && Array.isArray(state.badges);
        }],
        ["getLevel(0) returns level 1", () => getLevel(0) === 1],
        ["awardXp increases xp and appends event", () => {
          const state = awardXp(normalizeState({}), "test", 30, "测试");
          return state.xp === 30 && state.xpEvents.length === 1;
        }],
        ["awardBadge stores badge once", () => {
          const state = awardBadge(awardBadge(normalizeState({}), "first-lesson"), "first-lesson");
          return state.badges.length === 1;
        }],
        ["daily training task completes at five answers", () => {
          const state = markDailyActivity(normalizeState({}), "trainCount", 5, new Date("2026-06-13T00:00:00Z"));
          return getDailyTasks(state, new Date("2026-06-13T00:00:00Z")).train;
        }],
        ["curriculum has 19 textbook chapters including multiway pots", () => {
          return lessons.length === 19
            && lessons.some((lesson) => lesson.id === "multiway-pots");
        }],
        ["curriculum stages are sequential", () => lessons.every((lesson, index) => lesson.stage === index + 1)],
        ["first five chapters are beginner safe", () => {
          return lessons.slice(0, 5).every((lesson) => lesson.beginnerSafe === true);
        }],
        ["all chapters include one-for-all textbook fields", () => {
          return lessons.every((lesson) => lesson.id
            && lesson.title
            && lesson.subtitle
            && ["beginner", "intermediate", "advanced"].includes(lesson.difficulty)
            && Number.isFinite(lesson.estimatedMinutes)
            && lesson.estimatedMinutes >= 8
            && lesson.summary
            && lesson.plainLanguage
            && Array.isArray(lesson.goals)
            && lesson.goals.length >= 3
            && Array.isArray(lesson.prerequisites)
            && Array.isArray(lesson.sections)
            && lesson.sections.length >= 4
            && lesson.sections.every((section) => section.heading && section.body && section.keyTakeaway)
            && Array.isArray(lesson.examples)
            && lesson.examples.length >= 2
            && lesson.examples.every((example) => example.title && example.scenario && example.analysis && example.takeaway)
            && Array.isArray(lesson.decisionFlow)
            && lesson.decisionFlow.length >= 4
            && Array.isArray(lesson.mistakeDetails)
            && lesson.mistakeDetails.length >= 3
            && lesson.mistakeDetails.every((item) => item.mistake && item.whyItHurts && item.betterHabit)
            && Array.isArray(lesson.checkpoint)
            && lesson.checkpoint.length >= 2
            && lesson.checkpoint.length <= 4
            && Array.isArray(lesson.practiceTasks)
            && lesson.practiceTasks.length >= 2
            && lesson.practiceTasks.every((task) => task.title && task.body)
            && Array.isArray(lesson.relatedTerms)
            && lesson.relatedTerms.length >= 5);
        }],
        ["rules chapter teaches complete hand strength order", () => {
          const chapter = lessons.find((lesson) => lesson.id === "rules-hand-rankings-showdown");
          const text = JSON.stringify(chapter);
          return ["皇家同花顺", "同花顺", "四条", "葫芦", "同花", "顺子", "三条", "两对", "一对", "高牌"]
            .every((name) => text.includes(name));
        }],
        ["position chapter explains table sizes and position abbreviations", () => {
          const chapter = lessons.find((lesson) => lesson.id === "positions-blinds-action-order");
          const text = JSON.stringify(chapter);
          return ["4-max", "5-max", "6-max", "7-max", "8-max", "9-max"].every((label) => text.includes(label))
            && ["UTG", "HJ", "CO", "BTN", "SB", "BB", "枪口位", "劫位", "关煞位", "按钮位", "小盲", "大盲"].every((label) => text.includes(label))
            && !text.includes("能说出 6-max 六个位置的行动顺序")
            && !text.includes("按顺序说出 6-max 位置");
        }],
        ["beginner chapters include visible reference tables", () => {
          const rules = lessons.find((lesson) => lesson.id === "rules-hand-rankings-showdown");
          const positions = lessons.find((lesson) => lesson.id === "positions-blinds-action-order");
          const app = document.createElement("div");
          renderLearning({
            app,
            state: normalizeState({ beginnerMode: true }),
            setState: () => {},
            data: { lessons, glossaryTerms },
            navigate: () => {}
          });
          const text = app.textContent;
          return Array.isArray(rules.referenceTables)
            && rules.referenceTables.some((table) => table.title === "牌型速查表" && table.rows.length === 10)
            && Array.isArray(positions.referenceTables)
            && positions.referenceTables.some((table) => table.title === "桌型位置表" && table.rows.length >= 6)
            && text.includes("牌型速查表")
            && text.includes("桌型位置表")
            && text.includes("第 1 强")
            && text.includes("4-max");
        }],
        ["chapter prerequisites only point backward or to glossary terms", () => {
          const chapterIndex = new Map(lessons.map((lesson, index) => [lesson.id, index]));
          const termIds = new Set(glossaryTerms.map((term) => term.id));
          return lessons.every((lesson, index) => {
            return lesson.prerequisites.every((item) => {
              if (termIds.has(item)) return true;
              return chapterIndex.has(item) && chapterIndex.get(item) < index;
            });
          });
        }],
        ["all related chapter terms exist in glossary", () => {
          const termIds = new Set(glossaryTerms.map((term) => term.id));
          return lessons.every((lesson) => lesson.relatedTerms.every((termId) => termIds.has(termId)));
        }],
        ["multiway chapter teaches lower bluff frequency and higher value threshold", () => {
          const chapter = lessons.find((lesson) => lesson.id === "multiway-pots");
          const text = JSON.stringify(chapter);
          return chapter
            && chapter.stage > lessons.find((lesson) => lesson.id === "cbet-probe-donk-checkraise").stage
            && ["多人底池", "下注频率下降", "价值阈值提高", "顶对降级", "坚果听牌"].every((phrase) => text.includes(phrase));
        }],
        ["all lesson quizzes have three answerable questions", () => {
          return lessons.every((lesson) => Array.isArray(lesson.quiz)
            && lesson.quiz.length === 3
            && lesson.quiz.every((item) => item.question
              && Array.isArray(item.options)
              && item.options.length >= 2
              && item.options.includes(item.answer)
              && item.explanation));
        }],
        ["all lessons include valid next step actions", () => {
          const validRoutes = new Set(["learning", "ranges", "glossary", "training", "mistakes", "review", "resources"]);
          const lessonIds = new Set(lessons.map((lesson) => lesson.id));
          return lessons.every((lesson) => Array.isArray(lesson.nextSteps)
            && lesson.nextSteps.length >= 1
            && lesson.nextSteps.every((step) => {
              const routeOk = !step.route || validRoutes.has(step.route);
              const chapterOk = !step.chapterId || lessonIds.has(step.chapterId);
              return step.label && routeOk && chapterOk && (step.route || step.chapterId);
            }));
        }],
        ["glossary includes at least 120 structured terms", () => {
          return glossaryTerms.length >= 120
            && glossaryTerms.every((item) => item.id
              && item.term
              && item.english
              && Array.isArray(item.aliases)
              && item.category
              && ["beginner", "intermediate", "advanced"].includes(item.difficulty)
              && item.definition
              && item.simple
              && item.example
              && item.misunderstanding
              && Array.isArray(item.relatedTerms));
        }],
        ["glossary includes essential specialized vocabulary", () => {
          const searchable = glossaryTerms.map((term) => [
            term.id,
            term.term,
            term.english,
            term.abbreviation,
            ...(term.aliases || [])
          ].join(" ").toLowerCase()).join(" ");
          return ["c-bet", "donk bet", "probe bet", "range advantage", "nut advantage", "equity realization", "mdf", "icm", "tilt", "aks", "aqo", "pocket pair", "bb", "effective stack", "board texture"]
            .every((needle) => searchable.includes(needle));
        }],
        ["glossary includes position and table-size vocabulary", () => {
          const ids = new Set(glossaryTerms.map((term) => term.id));
          return ["utg", "utg-plus-one", "mp", "lj", "hj", "co", "btn", "sb", "bb", "table-size", "short-handed", "full-ring"]
            .every((id) => ids.has(id));
        }],
        ["search finds both chapters and terms for core queries", () => {
          return ["SPR", "limp", "range advantage", "turn barrel", "MDF", "ICM", "tilt"].every((query) => {
            const result = searchContent(query, lessons, glossaryTerms);
            return result.terms.length >= 1 && result.chapters.length >= 1;
          });
        }],
        ["learning path renders full textbook chapter content", () => {
          const app = document.createElement("div");
          const lesson = lessons[0];
          renderLearning({
            app,
            state: normalizeState({ beginnerMode: true }),
            setState: () => {},
            data: { lessons, glossaryTerms },
            navigate: () => {}
          });
          const text = app.textContent;
          return text.includes("19 章")
            && text.includes(lesson.sections[0].keyTakeaway)
            && text.includes(lesson.examples[0].analysis)
            && text.includes(lesson.mistakeDetails[0].betterHabit)
            && text.includes(lesson.practiceTasks[1].title)
            && text.includes(glossaryTerms.find((term) => term.id === lesson.relatedTerms[0]).term)
            && !text.includes("六阶段路线");
        }],
        ["glossary search renders term details and related chapters", () => {
          const app = document.createElement("div");
          setGlossarySearch("");
          renderGlossary({ app, data: { lessons, glossaryTerms } });
          const input = app.querySelector("[data-glossary-search]");
          input.value = "range advantage";
          input.dispatchEvent(new Event("input"));
          const text = app.textContent;
          return text.includes("相关章节")
            && text.includes("范围优势")
            && text.includes("Range advantage")
            && text.includes("常见误解");
        }],
        ["learning related terms open glossary search", () => {
          const app = document.createElement("div");
          let target = "";
          renderLearning({
            app,
            state: normalizeState({ beginnerMode: true }),
            setState: () => {},
            data: { lessons, glossaryTerms },
            navigate: () => {},
            openGlossarySearch: (query) => {
              target = query;
            }
          });
          app.querySelector("[data-lesson-term-search]").click();
          return target === glossaryTerms.find((term) => term.id === lessons[0].relatedTerms[0]).term;
        }],
        ["learning path renders chapter directory with current recommendation", () => {
          const app = document.createElement("div");
          renderLearning({
            app,
            state: normalizeState({ beginnerMode: true, completedLessons: [lessons[0].id, lessons[1].id] }),
            setState: () => {},
            data: { lessons, glossaryTerms },
            navigate: () => {}
          });
          const directoryButtons = [...app.querySelectorAll("[data-lesson-jump]")];
          const currentButton = app.querySelector("[data-lesson-jump].is-current");
          const completedButtons = app.querySelectorAll("[data-lesson-jump].is-complete");
          const text = app.textContent;
          return directoryButtons.length === 19
            && completedButtons.length === 2
            && currentButton?.dataset.lessonJump === lessons[2].id
            && text.includes("章节目录")
            && text.includes("当前建议")
            && text.includes("已完成 2/19");
        }],
        ["learning page renders 7-day and 30-day beginner routes", () => {
          const app = document.createElement("div");
          renderLearning({
            app,
            state: normalizeState({ beginnerMode: true }),
            setState: () => {},
            data: { lessons, glossaryTerms },
            navigate: () => {}
          });
          const text = app.textContent;
          return text.includes("7 天新手路线")
            && text.includes("30 天进阶路线")
            && text.includes("第 1 天")
            && text.includes("第 4 周");
        }],
        ["glossary can receive an external search query", () => {
          const app = document.createElement("div");
          setGlossarySearch("SPR");
          renderGlossary({ app, data: { lessons, glossaryTerms } });
          const text = app.textContent;
          const input = app.querySelector("[data-glossary-search]");
          setGlossarySearch("");
          return input.value === "SPR" && text.includes("相关章节") && text.includes("SPR");
        }],
        ["preflop ranges cover common 6-max to 9-max table sizes", () => {
          const required = {
            "4-max": ["CO", "BTN", "SB", "BB"],
            "5-max": ["HJ", "CO", "BTN", "SB", "BB"],
            "6-max": ["UTG", "HJ", "CO", "BTN", "SB", "BB"],
            "7-max": ["UTG", "LJ", "HJ", "CO", "BTN", "SB", "BB"],
            "8-max": ["UTG", "UTG+1", "LJ", "HJ", "CO", "BTN", "SB", "BB"],
            "9-max": ["UTG", "UTG+1", "MP", "LJ", "HJ", "CO", "BTN", "SB", "BB"]
          };
          return Object.entries(required).every(([tableSize, positions]) => {
            const available = new Set(preflopRanges.filter((item) => item.tableSize === tableSize).map((item) => item.position));
            return positions.every((position) => available.has(position));
          });
        }],
        ["range page renders table-size controls", () => {
          const app = document.createElement("div");
          renderRanges({ app, data: { preflopRanges } });
          const text = app.textContent;
          return ["4-max", "5-max", "6-max", "7-max", "8-max", "9-max"].every((label) => text.includes(label))
            && text.includes("常见桌型")
            && app.querySelectorAll("[data-range-table-size]").length === 6;
        }],
        ["range page renders a 13x13 beginner hand matrix", () => {
          const app = document.createElement("div");
          renderRanges({ app, data: { preflopRanges } });
          const cells = app.querySelectorAll("[data-hand-cell]");
          const text = app.textContent;
          return cells.length === 169
            && text.includes("13x13 起手牌矩阵")
            && text.includes("颜色图例")
            && app.querySelectorAll("[data-range-position]").length >= 4
            && app.querySelector('[data-hand-cell="AA"]')
            && app.querySelector('[data-hand-cell="AKs"]')
            && app.querySelector('[data-hand-cell="AKo"]');
        }],
        ["range matrix explains shorthand and clicked hands", () => {
          const app = document.createElement("div");
          renderRanges({ app, data: { preflopRanges } });
          app.querySelector('[data-range-table-size="4-max"]').click();
          app.querySelector('[data-range-position="CO"]').click();
          const a7s = app.querySelector('[data-hand-cell="A7s"]');
          const a6s = app.querySelector('[data-hand-cell="A6s"]');
          a7s.click();
          const text = app.textContent;
          return a7s.dataset.rangeAction === "open"
            && a6s.dataset.rangeAction === "fold"
            && text.includes("A7s+ 表示 A7s、A8s")
            && text.includes("A7s 在 4-max CO")
            && text.includes("默认可以开池");
        }],
        ["big blind range matrix uses defense scenarios instead of all blue cells", () => {
          const app = document.createElement("div");
          renderRanges({ app, data: { preflopRanges } });
          app.querySelector('[data-range-table-size="6-max"]').click();
          app.querySelector('[data-range-position="BB"]').click();
          const cells = [...app.querySelectorAll("[data-hand-cell]")];
          const contextCells = cells.filter((cell) => cell.dataset.rangeAction === "context");
          const aa = app.querySelector('[data-hand-cell="AA"]');
          const sevenTwo = app.querySelector('[data-hand-cell="72o"]');
          const text = app.textContent;
          return cells.length === 169
            && contextCells.length < 169
            && aa.dataset.rangeAction === "premium"
            && sevenTwo.dataset.rangeAction === "fold"
            && app.querySelectorAll("[data-bb-defense-scenario]").length >= 3
            && text.includes("面对 BTN/SB 偷盲")
            && text.includes("大盲防守场景");
        }],
        ["range matrix shows action counts and readable risk guidance", () => {
          const app = document.createElement("div");
          renderRanges({ app, data: { preflopRanges } });
          app.querySelector('[data-range-table-size="6-max"]').click();
          app.querySelector('[data-range-position="UTG"]').click();
          const text = app.textContent;
          const playable = Number(app.querySelector("[data-range-count-playable]")?.textContent || 0);
          const folded = Number(app.querySelector("[data-range-count-fold]")?.textContent || 0);
          return text.includes("范围统计")
            && text.includes("默认可玩")
            && text.includes("默认弃牌")
            && text.includes("不是死表")
            && playable > 0
            && folded > playable;
        }],
        ["big blind defense stats tighten against early opens", () => {
          const app = document.createElement("div");
          renderRanges({ app, data: { preflopRanges } });
          app.querySelector('[data-range-table-size="6-max"]').click();
          app.querySelector('[data-range-position="BB"]').click();
          const latePlayable = Number(app.querySelector("[data-range-count-playable]")?.textContent || 0);
          app.querySelector('[data-bb-defense-scenario="early-open"]').click();
          const earlyPlayable = Number(app.querySelector("[data-range-count-playable]")?.textContent || 0);
          const text = app.textContent;
          return latePlayable > earlyPlayable
            && earlyPlayable > 0
            && text.includes("早位开池代表强范围")
            && text.includes("面对早位强开池");
        }],
        ["drills include short-handed and full-ring table contexts", () => {
          const text = drills.map((drill) => drill.prompt).join(" ");
          return ["4-max", "5-max", "7-max", "8-max", "9-max", "多人底池"].every((label) => text.includes(label));
        }],
        ["review form supports 4-max through 9-max table formats", () => {
          const app = document.createElement("div");
          renderReview({ app, state: normalizeState({}), setState: () => {} });
          const select = app.querySelector('select[name="tableFormat"]');
          const values = [...select.options].map((item) => item.value);
          return ["4-max", "5-max", "6-max", "7-max", "8-max", "9-max"].every((label) => values.includes(label));
        }],
        ["dashboard recommendation identifies the dominant unresolved mistake type", () => {
          const app = document.createElement("div");
          renderDashboard({
            app,
            state: normalizeState({
              savedMistakes: [
                { questionId: "pf-001", status: "unresolved", wrongAnswers: ["跟注"] },
                { questionId: "pf-002", status: "unresolved", wrongAnswers: ["弃牌"] }
              ]
            }),
            setState: () => {},
            data: { lessons, drills },
            navigate: () => {}
          });
          const text = app.textContent;
          return text.includes("翻前范围")
            && text.includes("错题集中")
            && app.querySelector('[data-action="go-mistakes"]');
        }],
        ["dashboard recommendation targets the weakest trained drill type", () => {
          const app = document.createElement("div");
          renderDashboard({
            app,
            state: normalizeState({
              completedLessons: [lessons[0].id],
              handReviews: [{ id: "r1", heroHand: "As Ks", errorTypes: [], createdAt: "2026-06-13T00:00:00Z" }],
              drillAttempts: [
                { questionId: "pf-001", correct: true },
                { questionId: "pf-002", correct: true },
                { questionId: "od-001", correct: false },
                { questionId: "od-002", correct: false },
                { questionId: "od-003", correct: true }
              ]
            }),
            setState: () => {},
            data: { lessons, drills },
            navigate: () => {}
          });
          const text = app.textContent;
          return text.includes("赔率与 outs")
            && text.includes("薄弱训练")
            && app.querySelector('[data-action="go-training"]');
        }],
        ["streak counts consecutive active days", () => {
          const state = normalizeState({});
          const dayOne = markDailyActivity(state, "lesson", true, new Date("2026-06-12T00:00:00Z"));
          const dayTwo = markDailyActivity(dayOne, "review", true, new Date("2026-06-13T00:00:00Z"));
          return calculateStreak(dayTwo.dailyActivity, new Date("2026-06-13T00:00:00Z")) === 2;
        }],
        ["mastery returns four skill bars", () => {
          const mastery = calculateMastery(normalizeState({}), lessons, drills);
          return mastery.length === 4 && mastery.every((item) => item.id && item.label && Number.isFinite(item.value));
        }],
        ["daily bonus awards once after all tasks complete", () => {
          const date = new Date("2026-06-13T00:00:00Z");
          const withLesson = markDailyActivity(normalizeState({}), "lesson", true, date);
          const withTraining = markDailyActivity(withLesson, "trainCount", 5, date);
          const withReview = markDailyActivity(withTraining, "review", true, date);
          const awarded = maybeAwardDailyBonus(withReview, date);
          const awardedAgain = maybeAwardDailyBonus(awarded, date);
          return awarded.xp === 40
            && awardedAgain.xp === 40
            && getDailyTasks(awarded, date).bonusAwarded;
        }]
      ];

      const results = document.querySelector("#results");
      const rows = tests.map(([name, run]) => {
        let passed = false;
        let detail = "";
        try {
          passed = Boolean(run());
        } catch (error) {
          detail = error.message;
        }
        return `
          <div class="card">
            <strong>${passed ? "PASS" : "FAIL"} · ${name}</strong>
            ${detail ? `<p class="muted">${detail}</p>` : ""}
          </div>
        `;
      });

      results.innerHTML = rows.join("");
    </script>
  </body>
</html>
